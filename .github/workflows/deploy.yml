name: Deploy to GitHub Pages

on:
  push:
    branches: [Akhil-branch]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Build main branch → root ──────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: npm ci
      - run: npm run build
      - run: mv dist dist-main

      # ── Build Akhil-branch → /akhil-branch subfolder ──────────────────────
      - uses: actions/checkout@v4
        with:
          ref: Akhil-branch
          clean: false
      - run: npm ci
      - name: Build Akhil-branch
        run: npx vite build --base /MYNA-Automotive/akhil-branch/

      # ── Combine: main at root, Akhil at /akhil-branch ────────────────────
      - name: Combine builds
        run: |
          mkdir -p combined
          cp -r dist-main/. combined/
          mkdir -p combined/akhil-branch
          cp -r dist/. combined/akhil-branch/

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
